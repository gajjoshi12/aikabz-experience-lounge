<!-- ============================================================
     AIKABz — Interactive Demo Modals
     Include this snippet anywhere in your page.
     Trigger with:  <button data-service="1">Live Demo</button>
     ============================================================ -->

<!-- ─── MODAL OVERLAY ─────────────────────────────────────────── -->
<div id="aikab-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9998;backdrop-filter:blur(6px);" onclick="aikabCloseModal()"></div>

<!-- ─── SHARED MODAL SHELL ────────────────────────────────────── -->
<div id="aikab-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;width:min(92vw,680px);max-height:88vh;overflow-y:auto;background:#0f1117;border:1px solid #2a2d3a;border-radius:16px;box-shadow:0 32px 80px rgba(0,0,0,.7);font-family:'Inter',system-ui,sans-serif;color:#e8eaf0;">
  <div style="position:sticky;top:0;background:#0f1117;border-bottom:1px solid #1e2130;padding:18px 24px 16px;display:flex;align-items:center;justify-content:space-between;z-index:1;">
    <div>
      <div id="aikab-modal-badge" style="font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#7c6af7;margin-bottom:4px;"></div>
      <h2 id="aikab-modal-title" style="margin:0;font-size:1.25rem;font-weight:700;color:#fff;"></h2>
    </div>
    <button onclick="aikabCloseModal()" style="background:#1e2130;border:none;color:#9ca3b0;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s;" onmouseover="this.style.background='#2a2d3a'" onmouseout="this.style.background='#1e2130'">&#10005;</button>
  </div>
  <div id="aikab-modal-body" style="padding:24px;"></div>
  <div style="padding:0 24px 24px;">
    <button onclick="aikabCTA()" style="width:100%;padding:14px;background:linear-gradient(135deg,#7c6af7,#a855f7);border:none;border-radius:10px;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:opacity .2s;" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">Get This For My Business &rarr;</button>
  </div>
</div>

<style>
  #aikab-modal *{box-sizing:border-box;}
  .akb-chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .akb-green{background:#0d2e1a;color:#34d399;}
  .akb-blue{background:#0d1f3a;color:#60a5fa;}
  .akb-purple{background:#1e0d3a;color:#c084fc;}
  .akb-yellow{background:#2e2200;color:#fbbf24;}
  .akb-red{background:#2e0d0d;color:#f87171;}
  .akb-card{background:#161a27;border:1px solid #2a2d3a;border-radius:10px;padding:16px;}
  .akb-label{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
  .akb-waveform{display:flex;align-items:center;gap:3px;height:40px;}
  .akb-bar{width:4px;border-radius:3px;background:#7c6af7;animation:akb-wave 1s ease-in-out infinite;}
  @keyframes akb-wave{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}
  @keyframes akb-pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes akb-slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes akb-count-up{from{opacity:0}to{opacity:1}}
  @keyframes akb-spin{to{transform:rotate(360deg)}}
  .akb-typing-cursor::after{content:'|';animation:akb-pulse 1s infinite;}
  .akb-chat-bubble{padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.5;max-width:80%;animation:akb-slide-in .3s ease;}
  .akb-node{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:2px solid #2a2d3a;transition:all .4s;}
  .akb-node.active{border-color:#7c6af7;background:#1e1040;box-shadow:0 0 16px rgba(124,106,247,.5);}
  .akb-progress-bar{height:6px;border-radius:3px;background:#1e2130;overflow:hidden;}
  .akb-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7c6af7,#a855f7);transition:width 1s ease;}
  .akb-score-bar{height:8px;border-radius:4px;background:#1e2130;overflow:hidden;margin-top:4px;}
  .akb-score-fill{height:100%;border-radius:4px;transition:width 1.2s ease;}
  .akb-table th{font-size:11px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:6px 10px;text-align:left;}
  .akb-table td{padding:8px 10px;font-size:.84rem;border-top:1px solid #1e2130;}
  .akb-table tr:hover td{background:#161a27;}
  .akb-ticket{padding:12px;border-radius:8px;background:#161a27;border-left:3px solid #7c6af7;margin-bottom:8px;transition:all .5s;}
  .akb-ticket.resolved{border-left-color:#34d399;opacity:.65;}
  .akb-ad-card{background:#161a27;border:1px solid #2a2d3a;border-radius:8px;padding:12px;text-align:center;transition:all .3s;cursor:default;}
  .akb-ad-card.generating{border-color:#7c6af7;box-shadow:0 0 12px rgba(124,106,247,.3);}
  .akb-ad-card.done{border-color:#34d399;}
  .akb-flow-line{width:2px;background:#2a2d3a;flex:1;transition:background .4s;}
  .akb-flow-line.active{background:linear-gradient(180deg,#7c6af7,#a855f7);}
  ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:#0f1117;} ::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:3px;}
</style>

<script>
(function(){
  // ── Service data ──────────────────────────────────────────────
  const SERVICES = {
    1:{badge:'Revenue Generators',title:'AI Voice Calling'},
    2:{badge:'Revenue Generators',title:'Lead Gen Engine'},
    3:{badge:'Revenue Generators',title:'AI Sales Assistant'},
    4:{badge:'Revenue Generators',title:'AI Avatar Tours'},
    5:{badge:'Operations & Automation',title:'Smart Follow-Up'},
    6:{badge:'Operations & Automation',title:'AI Receptionist'},
    7:{badge:'Operations & Automation',title:'Workflow Automation'},
    8:{badge:'Operations & Automation',title:'AI Customer Support'},
    9:{badge:'Brand & Content',title:'Content Engine'},
    10:{badge:'Brand & Content',title:'AI Ad Creative'},
    11:{badge:'Brand & Content',title:'Reputation Management'},
    12:{badge:'Brand & Content',title:'AI Influencer / Spokesperson'},
    13:{badge:'Intelligence & Analytics',title:'AI Revenue Dashboard'},
    14:{badge:'Intelligence & Analytics',title:'Competitive Intelligence'},
    15:{badge:'Intelligence & Analytics',title:'Predictive Lead Scoring'},
    16:{badge:'Intelligence & Analytics',title:'AI Call Analytics'},
    17:{badge:'Jaw-Droppers',title:'AI Property / Product Tours'},
    18:{badge:'Jaw-Droppers',title:'AI Employee Onboarding'},
    19:{badge:'Jaw-Droppers',title:'AI SDR as a Service'},
    20:{badge:'Jaw-Droppers',title:'AI Knowledge Base / Co-pilot'},
  };

  let _timers = [];
  function _t(fn,ms){const id=setTimeout(fn,ms);_timers.push(id);return id;}
  function _i(fn,ms){const id=setInterval(fn,ms);_timers.push(id);return id;}
  function clearAllTimers(){_timers.forEach(clearTimeout);_timers.forEach(clearInterval);_timers=[];}

  // ── Open / close ──────────────────────────────────────────────
  window.aikabOpenModal = function(serviceId){
    clearAllTimers();
    const s = SERVICES[serviceId];
    if(!s) return;
    document.getElementById('aikab-modal-badge').textContent = s.badge;
    document.getElementById('aikab-modal-title').textContent = s.title;
    document.getElementById('aikab-modal-body').innerHTML = '';
    document.getElementById('aikab-overlay').style.display='block';
    document.getElementById('aikab-modal').style.display='block';
    document.body.style.overflow='hidden';
    const builder = BUILDERS[serviceId];
    if(builder) builder(document.getElementById('aikab-modal-body'));
  };

  window.aikabCloseModal = function(){
    clearAllTimers();
    document.getElementById('aikab-overlay').style.display='none';
    document.getElementById('aikab-modal').style.display='none';
    document.body.style.overflow='';
  };

  window.aikabCTA = function(){
    window.location.href = 'mailto:hello@aikabz.com?subject=I%20want%20this%20for%20my%20business';
  };

  // Wire up all trigger buttons
  document.addEventListener('click', function(e){
    const btn = e.target.closest('[data-service]');
    if(btn){ aikabOpenModal(parseInt(btn.dataset.service,10)); }
  });
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape') aikabCloseModal();
  });

  // ── Helpers ───────────────────────────────────────────────────
  function el(tag,attrs,html){
    const e=document.createElement(tag);
    Object.entries(attrs||{}).forEach(([k,v])=>k==='style'?(e.style.cssText=v):e.setAttribute(k,v));
    if(html!==undefined) e.innerHTML=html;
    return e;
  }
  function typewriter(target,text,speed,cb){
    let i=0;
    const id=_i(()=>{
      target.textContent=text.slice(0,++i)+(i<text.length?'▌':'');
      if(i>=text.length){clearInterval(id);if(cb)cb();}
    },speed||35);
  }
  function countUp(el,end,duration){
    let start=0,step=end/((duration||1200)/40);
    const id=_i(()=>{start=Math.min(start+step,end);el.textContent=Math.round(start).toLocaleString();if(start>=end)clearInterval(id);},40);
  }
  function waveformHTML(bars=18){
    return Array.from({length:bars},(_,i)=>`<div class="akb-bar" style="height:${14+Math.random()*22}px;animation-delay:${(i*0.07).toFixed(2)}s"></div>`).join('');
  }

  // ── BUILDERS ──────────────────────────────────────────────────
  const BUILDERS = {};

  // 1 — AI Voice Calling
  BUILDERS[1] = function(body){
    body.innerHTML = `
      <div class="akb-card" style="text-align:center;margin-bottom:16px;">
        <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#7c6af7,#a855f7);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:2rem;box-shadow:0 0 32px rgba(124,106,247,.5);animation:akb-pulse 2s infinite;">📞</div>
        <div style="font-size:.8rem;color:#9ca3b0;">AI Agent calling <strong style="color:#fff;">Sarah Mitchell</strong> · Inbound Sales</div>
        <div class="akb-chip akb-green" style="margin-top:8px;">● LIVE · 02:14</div>
        <div class="akb-waveform" style="justify-content:center;margin:14px auto 0;" id="wv1">${waveformHTML(24)}</div>
      </div>
      <div class="akb-card">
        <div class="akb-label">Live Transcript</div>
        <div id="transcript1" style="font-size:.84rem;line-height:1.8;min-height:120px;"></div>
      </div>`;
    const lines=[
      {speaker:'AI Agent',color:'#c084fc',text:'Hi Sarah! Thanks for reaching out to BrightCo. I\'m Aria, your AI sales advisor. How can I help you today?'},
      {speaker:'Sarah',color:'#60a5fa',text:'Hey, yeah — I was checking out your pricing page and had a few questions about the Pro plan.'},
      {speaker:'AI Agent',color:'#c084fc',text:'Absolutely! The Pro plan at $299/mo includes unlimited seats, full API access, and priority support. What specifically caught your eye?'},
      {speaker:'Sarah',color:'#60a5fa',text:'Mostly the CRM integrations. We\'re on HubSpot.'},
      {speaker:'AI Agent',color:'#c084fc',text:'Perfect — we have a native HubSpot bi-directional sync. I can schedule a 20-minute demo for you this week. Tuesday 2pm or Thursday 10am work?'},
    ];
    const t=document.getElementById('transcript1');
    let delay=400;
    lines.forEach(l=>{
      _t(()=>{
        const row=document.createElement('div');
        row.style.cssText='margin-bottom:8px;animation:akb-slide-in .3s ease;';
        row.innerHTML=`<span style="color:${l.color};font-weight:700;font-size:.78rem;">${l.speaker}: </span><span style="color:#d1d5db;">${l.text}</span>`;
        t.appendChild(row);
        t.scrollTop=t.scrollHeight;
      },delay);
      delay+=l.text.length*28+600;
    });
  };

  // 2 — Lead Gen Engine
  BUILDERS[2] = function(body){
    body.innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">
        ${['Scraped','Enriched','Scored','Outreached'].map((s,i)=>`
          <div class="akb-card" style="text-align:center;">
            <div class="akb-label">${s}</div>
            <div id="lc${i}" style="font-size:1.6rem;font-weight:800;color:#fff;">0</div>
          </div>`).join('')}
      </div>
      <div class="akb-card" style="margin-bottom:16px;">
        <div class="akb-label">Pipeline Flow</div>
        <div style="display:flex;align-items:center;gap:0;margin-top:8px;" id="pipeline2">
          ${['🌐 Scrape','✨ Enrich','🎯 Score','📧 Outreach','✅ Reply'].map((s,i,a)=>`
            <div style="display:flex;align-items:center;flex:1;">
              <div class="akb-node" id="pn${i}" style="flex-shrink:0;">${s}</div>
              ${i<a.length-1?`<div class="akb-flow-line" id="pl${i}"></div>`:''}
            </div>`).join('')}
        </div>
      </div>
      <div class="akb-card">
        <div class="akb-label">Latest Leads Entering Pipeline</div>
        <div id="leadfeed" style="max-height:130px;overflow:hidden;font-size:.82rem;"></div>
      </div>`;
    const targets=[4820,3241,2109,1876];
    targets.forEach((v,i)=>{ _t(()=>countUp(document.getElementById('lc'+i),v,1800),i*300); });
    [0,1,2,3,4].forEach(i=>{
      _t(()=>{
        document.getElementById('pn'+i)?.classList.add('active');
        if(i<4) document.getElementById('pl'+i)?.classList.add('active');
      },i*400+200);
    });
    const names=['Daniel Reeves · VP Sales @ Nexus Corp','Maria Lopes · CEO @ GrowthLabs','James Tran · CMO @ ShiftDigital','Priya Nair · Founder @ VelocityHQ','Tom Bakker · Head of Ops @ BlueDot'];
    let ni=0;
    const feed=document.getElementById('leadfeed');
    _i(()=>{
      const d=document.createElement('div');
      d.style.cssText='padding:5px 0;border-top:1px solid #1e2130;display:flex;justify-content:space-between;animation:akb-slide-in .3s ease;';
      d.innerHTML=`<span style="color:#e8eaf0;">${names[ni%names.length]}</span><span class="akb-chip akb-green">Queued</span>`;
      feed.prepend(d);
      if(feed.children.length>5) feed.lastChild.remove();
      ni++;
    },1400);
  };

  // 3 — AI Sales Assistant
  BUILDERS[3] = function(body){
    body.innerHTML=`
      <div class="akb-card" style="background:#075e54;border-color:#128c7e;max-height:360px;display:flex;flex-direction:column;">
        <div style="background:#054d44;padding:10px 14px;border-radius:6px 6px 0 0;display:flex;align-items:center;gap:10px;margin:-16px -16px 12px;">
          <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7c6af7,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.1rem;">🤖</div>
          <div><div style="font-weight:700;font-size:.9rem;">Aria · AI Sales Assistant</div><div style="font-size:.75rem;color:#a7f3d0;">● Online 24/7</div></div>
        </div>
        <div id="chat3" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:4px;"></div>
        <div style="display:flex;gap:8px;margin-top:12px;margin:-0px -0px -0px 0;">
          <div style="flex:1;background:#1d3a35;border-radius:22px;padding:10px 14px;font-size:.82rem;color:#6b7280;">Type a message…</div>
          <div style="width:36px;height:36px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;font-size:1.1rem;">➤</div>
        </div>
      </div>`;
    const chat=document.getElementById('chat3');
    const convo=[
      {who:'user',text:'Hi, I saw your ad for the AI chatbot — how much does it cost?'},
      {who:'ai',text:'Hey! Great timing 👋 Our AI Sales Assistant starts at $497/mo and typically pays for itself within the first 2 weeks by qualifying leads 24/7. What\'s your current monthly lead volume?'},
      {who:'user',text:'Around 300-400 leads per month. We\'re losing a lot because we can\'t follow up fast enough.'},
      {who:'ai',text:'That\'s a real pain — speed-to-lead is everything. Our bot responds in under 3 seconds, qualifies by budget + timeline, and books demos straight to your calendar. Want me to show you a quick demo of it handling a lead like yours right now?'},
      {who:'user',text:'Yes please!'},
      {who:'ai',text:'Perfect! I just sent a demo invite to your email 📅 One quick question — are you looking to replace your current reps or augment them? That helps me tailor the demo.'},
    ];
    let delay=300;
    convo.forEach(msg=>{
      _t(()=>{
        const bubble=document.createElement('div');
        bubble.style.cssText=`display:flex;justify-content:${msg.who==='user'?'flex-end':'flex-start'};`;
        const inner=document.createElement('div');
        inner.className='akb-chat-bubble';
        inner.style.cssText=`background:${msg.who==='user'?'#005c4b':'#1f2c34'};color:#e8eaf0;`;
        bubble.appendChild(inner);
        chat.appendChild(bubble);
        chat.scrollTop=chat.scrollHeight;
        if(msg.who==='ai'){
          let i=0;
          const tid=_i(()=>{
            inner.textContent=msg.text.slice(0,++i)+(i<msg.text.length?'▌':'');
            chat.scrollTop=chat.scrollHeight;
            if(i>=msg.text.length) clearInterval(tid);
          },22);
        } else {
          inner.textContent=msg.text;
        }
      },delay);
      delay+=msg.text.length*22+800;
    });
  };

  // 4 — AI Avatar Tours
  BUILDERS[4] = function(body){
    body.innerHTML=`
      <div class="akb-card" style="position:relative;overflow:hidden;padding:0;margin-bottom:16px;">
        <div style="width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#1a1040,#0d2040);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;">
          <div style="position:absolute;inset:0;background:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%25%22 height=%22100%25%22><defs><radialGradient id=%22g%22><stop offset=%220%25%22 stop-color=%22%237c6af740%22/><stop offset=%22100%25%22 stop-color=%22transparent%22/></radialGradient></defs><rect width=%22100%25%22 height=%22100%25%22 fill=%22url(%23g)%22/></svg>');"></div>
          <div id="avplay4" style="width:72px;height:72px;border-radius:50%;background:rgba(124,106,247,.2);border:3px solid #7c6af7;display:flex;align-items:center;justify-content:center;font-size:2.2rem;cursor:pointer;transition:transform .2s;box-shadow:0 0 0 0 rgba(124,106,247,.5);animation:akb-pulse 2s infinite;" onclick="aikabPlay4()">▶</div>
          <div style="margin-top:16px;font-size:.9rem;color:#c4b5fd;font-weight:600;" id="avstat4">Click to preview AI Avatar Tour</div>
          <div style="position:absolute;bottom:12px;left:12px;right:12px;display:flex;align-items:center;gap:10px;">
            <div style="flex:1;height:3px;background:#ffffff20;border-radius:2px;overflow:hidden;"><div id="progbar4" style="height:100%;width:0%;background:#7c6af7;transition:width .3s;"></div></div>
            <span style="font-size:.75rem;color:#9ca3b0;" id="progtime4">0:00</span>
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
        ${['Luxury Penthouse — Dubai','Commercial Unit — DIFC','Villa — Palm Jumeirah'].map((t,i)=>`
          <div class="akb-card" style="padding:10px;cursor:pointer;" onmouseover="this.style.borderColor='#7c6af7'" onmouseout="this.style.borderColor='#2a2d3a'">
            <div style="aspect-ratio:16/9;background:linear-gradient(135deg,hsl(${230+i*20},40%,15%),hsl(${250+i*20},50%,20%));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:6px;">🏙️</div>
            <div style="font-size:.75rem;color:#d1d5db;font-weight:600;">${t}</div>
            <div class="akb-chip akb-purple" style="margin-top:4px;">AI Tour Ready</div>
          </div>`).join('')}
      </div>`;
    let playing=false,prog=0,progId;
    window.aikabPlay4=function(){
      if(playing) return;
      playing=true;
      document.getElementById('avplay4').textContent='⏸';
      document.getElementById('avstat4').textContent='AI Avatar narrating — "Welcome to this stunning 3-bed penthouse…"';
      progId=_i(()=>{
        prog=Math.min(prog+0.4,100);
        document.getElementById('progbar4').style.width=prog+'%';
        const s=Math.round(prog*1.5);
        document.getElementById('progtime4').textContent=`0:${String(s).padStart(2,'0')}`;
        if(prog>=100){clearInterval(progId);document.getElementById('avstat4').textContent='Tour complete ✓';}
      },80);
    };
  };

  // 5 — Smart Follow-Up
  BUILDERS[5] = function(body){
    const steps=[
      {icon:'📧',ch:'Email',time:'Day 0',msg:'Subject: Quick question about your growth goals',status:'sent'},
      {icon:'💬',ch:'WhatsApp',time:'Day 2 · No reply',msg:'"Hey [Name], just checking if you got my note — any questions?"',status:'pending'},
      {icon:'📱',ch:'SMS',time:'Day 4 · No reply',msg:'"Hi, last nudge from BrightCo — free 15-min consult this week?"',status:'pending'},
      {icon:'📧',ch:'Email',time:'Day 7 · Opened 3x',msg:'Subject: [Name], here\'s the case study you asked about',status:'pending'},
      {icon:'💬',ch:'WhatsApp',time:'Day 10 · Link clicked',msg:'"Saw you checked out the case study! Ready to explore options?"',status:'pending'},
    ];
    body.innerHTML=`
      <div class="akb-card" style="margin-bottom:16px;">
        <div class="akb-label">Trigger: New lead opted in via landing page</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
          <div class="akb-chip akb-green">● Active Sequence</div>
          <div class="akb-chip akb-blue">247 contacts enrolled</div>
        </div>
      </div>
      <div id="seq5">
        ${steps.map((s,i)=>`
          <div style="display:flex;gap:12px;margin-bottom:14px;" id="step5_${i}">
            <div style="display:flex;flex-direction:column;align-items:center;">
              <div style="width:36px;height:36px;border-radius:50%;background:#1e2130;border:2px solid #2a2d3a;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .4s;" id="stepicon5_${i}">${s.icon}</div>
              ${i<steps.length-1?'<div style="width:2px;flex:1;background:#2a2d3a;min-height:20px;margin:4px 0;" id="stepline5_'+i+'"></div>':''}
            </div>
            <div style="flex:1;padding-bottom:4px;">
