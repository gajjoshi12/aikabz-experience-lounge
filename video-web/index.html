<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UberEats Flow</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{height:100%;background:#111;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  body{display:flex;align-items:center;justify-content:center;}

  /* fixed 9:16 design canvas, scaled to fit by JS */
  #viewport{position:relative;}
  .stage{
    position:relative;width:360px;height:640px;background:#000;overflow:hidden;
    transform-origin:top left;
  }

  /* scene layers */
  .scene{position:absolute;inset:0;opacity:0;transition:opacity .4s ease;}
  .scene.on{opacity:1;}

  /* ───── 1. iMessage (dark) ───── */
  #s-imsg{background:#000;}
  .day{position:absolute;top:60px;width:100%;text-align:center;
    color:#7d7d82;font-size:12px;font-weight:600;}
  .day b{color:#c7c7cc;font-weight:600;}

  .bub{position:absolute;max-width:200px;padding:9px 14px;font-size:16px;
    line-height:1.25;border-radius:18px;opacity:0;transform:scale(.6);
    transform-origin:bottom right;transition:transform .28s cubic-bezier(.2,.9,.3,1.4),opacity .2s;}
  .bub.in{opacity:1;transform:scale(1);}
  .bub.sent{right:18px;top:120px;color:#fff;
    background:linear-gradient(180deg,#27a4ff,#0a84ff);border-bottom-right-radius:5px;}
  .bub.recv{left:18px;top:178px;color:#fff;background:#3a3a3c;
    border-bottom-left-radius:5px;transform-origin:bottom left;}

  .dots{display:inline-flex;gap:5px;align-items:center;height:20px;}
  .dots i{width:8px;height:8px;border-radius:50%;background:#fff;opacity:.5;
    animation:dot 1.2s infinite;}
  .dots i:nth-child(2){animation-delay:.2s;}
  .dots i:nth-child(3){animation-delay:.4s;}
  .sent .dots i{background:#dcefff;}
  @keyframes dot{0%,60%,100%{opacity:.4;transform:translateY(0);}30%{opacity:1;transform:translateY(-4px);}}

  /* ───── 2. Uber Eats icon ───── */
  #s-icon{background:#fff;}
  .icon{position:absolute;left:50%;top:50%;width:130px;height:130px;
    margin:-65px 0 0 -65px;background:#00c24e;border-radius:30px;
    display:flex;flex-direction:column;justify-content:center;padding-left:18px;
    transform:scale(0);}
  #s-icon.on .icon{animation:pop .55s cubic-bezier(.2,.9,.3,1.45) forwards;}
  @keyframes pop{0%{transform:scale(0);}100%{transform:scale(1);}}
  .icon b{color:#0a0a0a;font-weight:800;font-size:26px;line-height:1.02;letter-spacing:-1px;}

  /* ───── 3. search ───── */
  #s-search{background:#fff;display:flex;align-items:center;justify-content:center;}
  .search{width:230px;height:48px;background:#e9e9eb;border-radius:24px;
    display:flex;align-items:center;gap:9px;padding:0 18px;color:#9b9b9f;font-size:17px;
    transform:scale(.96);opacity:0;transition:opacity .3s,transform .3s;}
  #s-search.on .search{opacity:1;transform:scale(1);}

  /* ───── 4. loading pill ───── */
  #s-load{background:#fff;display:flex;align-items:center;justify-content:center;}
  .loadpill{width:250px;height:66px;border-radius:33px;background:#d9d9dc;
    position:relative;overflow:hidden;}
  .loadpill::after{content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent);
    transform:translateX(-100%);}
  #s-load.on .loadpill::after{animation:shim 1.1s linear infinite;}
  @keyframes shim{to{transform:translateX(100%);}}

  /* ───── 5. green toggle ───── */
  #s-toggle{background:#fff;display:flex;align-items:center;justify-content:center;}
  .track{width:255px;height:74px;border-radius:37px;border:3px solid #00c24e;
    display:flex;align-items:center;padding:7px;}
  .knob{width:46%;height:100%;border-radius:30px;background:#bdbdc2;transform:translateX(0);}
  #s-toggle.on .knob{animation:slide 1.2s cubic-bezier(.6,0,.4,1) infinite alternate;}
  @keyframes slide{to{transform:translateX(116%);}}

  /* ───── 6 & 7. status cards ───── */
  #s-req,#s-driver{background:#fff;display:flex;align-items:center;justify-content:center;}
  .card{width:280px;background:#fff;border-radius:16px;padding:18px 22px;text-align:center;
    box-shadow:0 12px 40px rgba(0,0,0,.13);border:1px solid #f0f0f0;}
  .card h3{font-size:18px;color:#111;font-weight:700;margin-bottom:5px;}
  .card p{font-size:14px;color:#a0a0a5;}
  .bar{margin-top:14px;height:5px;border-radius:3px;background:#ededed;overflow:hidden;}
  .bar i{display:block;height:100%;width:0;background:#00c24e;border-radius:3px;}
  #s-driver.on .bar i{animation:fill 1.2s ease forwards;}
  @keyframes fill{to{width:100%;}}
  .bar.ind i{width:38%;}
  #s-req.on .bar.ind i{animation:ind 1.1s ease-in-out infinite;}
  @keyframes ind{0%{margin-left:-38%;}100%{margin-left:100%;}}

  /* ───── 8. map ───── */
  #s-map{background:#e7eaed;}
  .roads{position:absolute;inset:0;background:#e9ecee;}
  .blk{position:absolute;background:#dfe3e6;border-radius:3px;}
  .park{position:absolute;background:#cde6c4;border-radius:8px;}
  .road{position:absolute;background:#fff;}
  .marker{position:absolute;left:150px;top:300px;}
  #s-map.on .marker{animation:drive 2.4s ease-in-out infinite alternate;}
  @keyframes drive{0%{left:120px;top:330px;}100%{left:200px;top:280px;}}
  .marker .dot{position:absolute;left:6px;top:6px;width:30px;height:30px;border-radius:50%;
    background:#1a73ff;box-shadow:0 0 0 6px rgba(26,115,255,.25);}
  .marker .veh{position:absolute;left:-6px;top:-14px;width:30px;height:40px;border-radius:8px;
    background:#1a73ff;transform:rotate(-28deg);border:2px solid #fff;}

  /* ───── 9. splash ───── */
  #s-splash{background:#fff;display:flex;align-items:center;justify-content:center;}
  .splash{font-size:40px;font-weight:800;letter-spacing:-1px;opacity:0;transform:scale(.9);
    transition:opacity .4s,transform .4s;}
  #s-splash.on .splash{opacity:1;transform:scale(1);}
  .splash .u{color:#111;} .splash .e{color:#00c24e;}

  /* ───── 10. project ───── */
  #s-project{background:#fff;display:flex;align-items:center;justify-content:center;}
  .proj{font-size:26px;color:#111;font-weight:500;text-align:center;line-height:1.25;
    opacity:0;transition:opacity .5s;}
  #s-project.on .proj{opacity:1;}

  /* ───── cursor (persistent, moves across scenes) ───── */
  #cursor{position:absolute;left:0;top:0;width:30px;height:30px;z-index:50;opacity:0;
    transition:transform .55s cubic-bezier(.4,0,.2,1),opacity .25s;pointer-events:none;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.45));}
  #cursor.show{opacity:1;}
  #cursor .inner{width:100%;height:100%;transition:transform .12s;transform-origin:top left;}
  #cursor.tap .inner{animation:taptap .4s ease;}
  @keyframes taptap{0%{transform:scale(1);}45%{transform:scale(.75);}100%{transform:scale(1);}}
</style>
</head>
<body>
<div id="viewport">
<div class="stage" id="stage">

  <!-- 1. iMessage -->
  <div class="scene" id="s-imsg">
    <div class="day">Today <b>8:32 PM</b></div>
    <div class="bub sent" id="bub-sent"></div>
    <div class="bub recv" id="bub-recv"></div>
  </div>

  <!-- 2. icon -->
  <div class="scene" id="s-icon"><div class="icon"><b>Uber</b><b>Eats</b></div></div>

  <!-- 3. search -->
  <div class="scene" id="s-search">
    <div class="search">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#9b9b9f" stroke-width="2.4">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>Search
    </div>
  </div>

  <!-- 4. loading -->
  <div class="scene" id="s-load"><div class="loadpill"></div></div>

  <!-- 5. toggle -->
  <div class="scene" id="s-toggle"><div class="track"><div class="knob"></div></div></div>

  <!-- 6. requested -->
  <div class="scene" id="s-req">
    <div class="card"><h3>Delivery requested</h3><p>Finding drivers nearby</p>
      <div class="bar ind"><i></i></div></div>
  </div>

  <!-- 7. driver found -->
  <div class="scene" id="s-driver">
    <div class="card"><h3>Driver found</h3><p>Your food will be delivered</p>
      <div class="bar"><i></i></div></div>
  </div>

  <!-- 8. map -->
  <div class="scene" id="s-map">
    <div class="roads">
      <div class="blk" style="left:20px;top:80px;width:90px;height:70px;"></div>
      <div class="blk" style="left:140px;top:60px;width:110px;height:60px;"></div>
      <div class="blk" style="left:30px;top:420px;width:120px;height:90px;"></div>
      <div class="blk" style="left:230px;top:400px;width:110px;height:120px;"></div>
      <div class="park" style="left:235px;top:120px;width:110px;height:120px;"></div>
      <div class="park" style="left:15px;top:230px;width:70px;height:90px;"></div>
      <div class="road" style="left:0;top:200px;width:360px;height:14px;"></div>
      <div class="road" style="left:0;top:370px;width:360px;height:14px;"></div>
      <div class="road" style="left:120px;top:0;width:14px;height:640px;"></div>
      <div class="road" style="left:0;top:300px;width:360px;height:10px;transform:rotate(-12deg);transform-origin:left;"></div>
    </div>
    <div class="marker"><div class="dot"></div><div class="veh"></div></div>
  </div>

  <!-- 9. splash -->
  <div class="scene" id="s-splash"><div class="splash"><span class="u">Uber </span><span class="e">Eats</span></div></div>

  <!-- 10. project -->
  <div class="scene" id="s-project"><div class="proj">request a<br>project</div></div>

  <!-- cursor -->
  <div id="cursor"><svg class="inner" viewBox="0 0 24 24" fill="#fff" stroke="#000" stroke-width="1.3" stroke-linejoin="round"><path d="M5 2.5l13.5 7.8-5.7 1.5-1.6 5.4z"/></svg></div>

</div>
</div>

<script>
(function(){
  const stage = document.getElementById('stage');
  const vp = document.getElementById('viewport');
  const $ = id => document.getElementById(id);
  const cursor = $('cursor');

  // fit 360x640 canvas to viewport height
  function fit(){
    const s = Math.min(window.innerHeight/640, window.innerWidth/360);
    stage.style.transform = `scale(${s})`;
    vp.style.width = (360*s)+'px';
    vp.style.height = (640*s)+'px';
  }
  fit(); window.addEventListener('resize', fit);

  const sleep = ms => new Promise(r=>setTimeout(r,ms));

  function only(id){
    document.querySelectorAll('.scene').forEach(s=>s.classList.toggle('on', s.id===id));
  }

  // ── cursor controls (coords in 360x640 design space) ──
  function moveCursor(x,y){
    cursor.classList.add('show');
    cursor.style.transform = `translate(${x}px,${y}px)`;
    return sleep(560);
  }
  async function tap(){
    cursor.classList.remove('tap'); void cursor.offsetWidth;
    cursor.classList.add('tap');
    await sleep(400);
  }
  function hideCursor(){ cursor.classList.remove('show'); }

  // ── typewriter into a bubble; shows dots first, then types ──
  async function typeBubble(el, text, dotsMs){
    el.classList.add('in');
    el.innerHTML = '<span class="dots"><i></i><i></i><i></i></span>';
    await sleep(dotsMs);
    el.textContent = '';
    for(let i=0;i<text.length;i++){
      el.textContent = text.slice(0,i+1);
      await sleep(45);
    }
  }

  function resetImsg(){
    $('bub-sent').className='bub sent'; $('bub-sent').innerHTML='';
    $('bub-recv').className='bub recv'; $('bub-recv').innerHTML='';
    hideCursor();
  }

  async function sequence(){
    // ===== 1. iMessage =====
    resetImsg();
    only('s-imsg');
    await sleep(400);
    await typeBubble($('bub-sent'), "Brother i'm starving", 1100);  // blue: dots -> text
    await sleep(450);
    await typeBubble($('bub-recv'), "Try UberEats", 950);           // gray: dots -> text
    await sleep(300);
    // cursor flies in and taps the reply
    await moveCursor(118, 196);
    await tap();
    await sleep(450);
    hideCursor();

    // ===== 2. Uber Eats icon =====
    only('s-icon');
    await sleep(1300);

    // ===== 3. search (cursor taps) =====
    only('s-search');
    await sleep(350);
    await moveCursor(150, 300);
    await tap();
    await sleep(500);
    hideCursor();

    // ===== 4. loading pill =====
    only('s-load');
    await sleep(1000);

    // ===== 5. green toggle =====
    only('s-toggle');
    await sleep(1200);

    // ===== 6. delivery requested =====
    only('s-req');
    await sleep(1100);

    // ===== 7. driver found + progress =====
    only('s-driver');
    await sleep(1400);

    // ===== 8. map =====
    only('s-map');
    await sleep(2000);

    // ===== 9. splash =====
    only('s-splash');
    await sleep(1100);

    // ===== 10. request a project =====
    only('s-project');
    await sleep(1300);
  }

  (async function loop(){
    while(true){ await sequence(); }
  })();
})();
</script>
</body>
</html>
